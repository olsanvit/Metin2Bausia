# ============================================================
# Metin2Bausia — nginx proxy konfigurace pro QNAP
# Přidat do: /etc/nginx/conf.d/ nebo do existujícího server bloku mcp.vo2info.cz
# ============================================================

# MT2 MCP API — https://mcp.vo2info.cz/MT2/
location /MT2/ {
    proxy_pass         http://localhost:3030/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Základní auth (stejná jako ostatní MCP endpointy)
    auth_basic           "MT2 MCP";
    auth_basic_user_file /etc/nginx/.htpasswd;
}

