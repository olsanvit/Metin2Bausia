server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    autoindex off;

    # CORS pro patcher (stahování z různých domén)
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, HEAD";

    # Klientské soubory — přímé stahování
    location /client/ {
        alias /usr/share/nginx/html/client/;

        # Cache pro velké soubory (epk)
        location ~* \.(epk|eix|exe|dll|bin)$ {
            expires 1d;
            add_header Cache-Control "public, must-revalidate";
        }

        # Manifest — bez cache (vždy čerstvý)
        location = /client/manifest.json {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Health check
    location /ping {
        return 200 "pong\n";
        add_header Content-Type text/plain;
    }

    # Zakázat přístup ke skrytým souborům
    location ~ /\. {
        deny all;
    }
}
