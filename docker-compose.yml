version: "3.9"

services:
  mt2-postgres:
    image: postgres:16-alpine
    container_name: mt2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: Metin2Bausia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - mt2-pgdata:/var/lib/postgresql/data
      - ./database/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Metin2Bausia"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - mt2-net

  mt2-mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    image: metin2bausia-mcp:latest
    container_name: mt2-mcp
    restart: unless-stopped
    depends_on:
      mt2-postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@mt2-postgres:5432/Metin2Bausia
      MT2_FILES_DIR: /app/mt2files
      NTFY_URL: https://ntfy.vo2info.cz
      NTFY_AUTH: "Basic YWRtaW46Um91bmRuZXQ1NzVQYWRlbA=="
      NTFY_TOPIC_RUNS: agent-runs
      NTFY_TOPIC_ERRORS: agent-errors
      NTFY_TOPIC_ALERTS: agent-alerts
    volumes:
      - mt2-files:/app/mt2files
      - mt2-uploads:/app/uploads
    ports:
      - "3030:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mt2-net

  mt2-admin:
    build:
      context: .
      dockerfile: src/Metin2Bausia.Web/Dockerfile
    image: metin2bausia-admin:latest
    container_name: mt2-admin
    restart: unless-stopped
    depends_on:
      mt2-postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ConnectionStrings__Metin2Bausia: "Host=mt2-postgres;Port=5432;Database=Metin2Bausia;Username=postgres;Password=${POSTGRES_PASSWORD:-changeme}"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mt2-net

  # Patch server — hosting klientských souborů ke stažení
  mt2-patch:
    build:
      context: ./patcher/server
      dockerfile: Dockerfile
    image: metin2bausia-patch:latest
    container_name: mt2-patch
    restart: unless-stopped
    volumes:
      - mt2-client-files:/usr/share/nginx/html/client
      # Po vygenerování manifestu: zkopírovat manifest.json do volume
    ports:
      - "3031:80"    # http://localhost:3031/client/manifest.json
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - mt2-net

volumes:
  mt2-pgdata:
    name: mt2-pgdata
  mt2-files:
    name: mt2-files
  mt2-uploads:
    name: mt2-uploads
  mt2-client-files:
    name: mt2-client-files

networks:
  mt2-net:
    name: mt2-net
    driver: bridge
