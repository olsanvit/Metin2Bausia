# ============================================================
# Metin2Bausia — Auth/Login server konfigurace (TMP4)
# ============================================================

PORT                = 11002
P2P_PORT            = 11900

# DB server
DB_ADDR             = mt2-db
DB_PORT             = 15000

# MySQL (pro přímé autentizační dotazy)
SQL_ACCOUNT_HOST    = mt2-mysql
SQL_ACCOUNT_PORT    = 3306
SQL_ACCOUNT_USER    = root
SQL_ACCOUNT_PASS    = bausia_root_secret
SQL_ACCOUNT_DB      = account

# Herní server(y) — registrace dostupných serverů pro login screen
# FORMAT: GAME_SERVER = IP PORT CHANNEL_NAME POPULATION_MAX
GAME_SERVER         = mt2-game-ch1 13000 CH1 1000

# Nastavení
AUTH_CAPTCHA        = 0
MAX_LOGIN_QUEUE     = 100

# IP ban list (cesta k souboru)
IP_BAN_LIST         = /usr/local/metin2/share/ip_ban.txt
